# Mac OS X pasteboardを使用できるようにする（tmux 3.2+はset-clipboardで対応）
set -s set-clipboard on

# デフォルトのプレフィックスキーはctrl + bだが、シェルの操作とぶつかるので、ctrl + tに変更する
unbind C-b
set-option -g prefix C-t
bind C-t send-prefix

# コピーモードでvimキーバインドを使う
setw -g mode-keys vi

# 'v' で選択を始める
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# `Enter` でもcopy-pipeを使う
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# ']' でpbpasteを使う
bind ] run "pbpaste | tmux load-buffer - && tmux paste-buffer"

bind ^c new-window
# プレフィックスキーの二度押しでウィンドウが切り替わるのを防ぐため無効化
# bind ^t last-window
bind ^n next-window
bind ^p previous-window

# bufferの行数を53万にする
set -g history-limit 530000

# カーソルのエスケープシーケンスをパススルーする
#set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# マウス操作を有効化（スクロール、ペイン選択、リサイズ等）
set -g mouse on

# フォーカスイベントを有効化（アクティブウィンドウの検出用）
set -g focus-events on

# カーソルを点滅するブロックに設定
# アクティブペインを切り替えるとうまくいかない
#set -g cursor-style blinking-block

# アクティブペインの背景色を変えて視認性を向上
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=colour250,bg=black'

# find-windowを無効化
unbind f

# ペイン分割時に現在のディレクトリを引き継ぐ
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
